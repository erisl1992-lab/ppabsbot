<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paygram - Registro y Cambio</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #f4f4f7);
            --text-color: var(--tg-theme-text-color, #000000);
            --hint-color: var(--tg-theme-hint-color, #aaaaaa);
            --button-color: var(--tg-theme-button-color, #007cb0);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
            --card-bg: var(--tg-theme-secondary-bg-color, #ffffff);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
        }

        /* Barra superior para la hora y la bandera */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 8px;
            margin-bottom: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-color);
        }

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 6px;
            background-color: var(--card-bg);
            padding: 6px 12px;
            border-radius: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .card {
            background-color: var(--card-bg);
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 16px;
        }

        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: var(--button-color);
        }

        .input-group {
            margin-bottom: 15px;
        }

        .cedula-container {
            display: flex;
            gap: 8px;
        }

        .cedula-tipo {
            width: 70px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .file-upload {
            position: relative;
            display: inline-block;
            width: 100%;
            margin-top: 5px;
        }

        .file-upload-btn {
            display: block;
            text-align: center;
            background-color: rgba(0, 124, 176, 0.1);
            color: var(--button-color);
            padding: 12px;
            border: 2px dashed var(--button-color);
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .file-upload input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .preview-img {
            width: 100%;
            max-height: 150px;
            object-fit: cover;
            border-radius: 8px;
            margin-top: 8px;
            display: none;
        }

        .resultado-box {
            background-color: rgba(0, 124, 176, 0.1);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            margin-top: 10px;
        }

        .resultado-box strong {
            color: var(--button-color);
        }

        /* Botón de enviar con soporte para logo Flexbox */
        .btn-enviar {
            width: 100%;
            padding: 14px;
            background-color: var(--button-color);
            color: var(--button-text);
            border: none;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background-color 0.2s;
        }

        /* Estilo específico para el botón de PayPal */
        .btn-paypal {
            background-color: #0070ba;
            color: #ffffff;
        }

        .paypal-icon {
            width: 20px;
            height: 20px;
            fill: #ffffff;
        }

        .oculto {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div style="font-size: 1.1rem; font-weight: bold; color: var(--button-color);">Paygram</div>
        <div class="top-bar-right">
            <span id="hora-venezuela">00:00:00</span>
            <span style="font-size: 1.2rem; line-height: 1;">🇻🇪</span>
        </div>
    </div>

    <div id="seccion-registro">
        <div class="card">
            <h2>Verificación de Identidad (KYC)</h2>
            <p style="font-size: 0.85rem; color: var(--hint-color);

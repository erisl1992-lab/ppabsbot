<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPABS - Pasarela de Servicios Logísticos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <script src="https://www.paypal.com/sdk/js?client-id=test&currency=USD&enable-funding=card&integration-date=2026-06-22"></script>
    
    <style>
        /* =========================================================================
           🎨 CONFIGURACIÓN CSS PASADA POR EL ADMINISTRADOR (INTEGRACIÓN DE CABECERA)
           ========================================================================= */
        .sitio-header {
            background-color: #ffffff; /* Fondo blanco para que combine con el logo */
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05); /* Una sutil sombra abajo */
            position: sticky;
            top: 0;
            z-index: 1000; /* Hace que la cabecera se quede fija arriba al bajar la página */
        }

        .contenedor-header {
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between; /* Pone el logo a la izquierda y el menú a la derecha */
            align-items: center; /* Centra verticalmente ambos elementos */
        }

        .logo-img {
            height: 45px; /* Define la altura que quieras para tu barra de navegación */
            width: auto;  /* Mantiene la proporción original para que no se deforme */
            display: block;
        }

        .navegacion a {
            color: #002d62; /* El color azul marino de tu logo */
            text-decoration: none;
            margin-left: 20px;
            font-family: sans-serif;
            font-weight: 600;
        }

        .navegacion a:hover {
            color: #0070ba; /* Color azul más claro al pasar el mouse */
        }

        /* =========================================================================
           🖥️ ESTILOS GENERALES DEL PANEL COMERCIAL (INTERFAZ DE USUARIO)
           ========================================================================= */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0e1621;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }
        .main-wrapper {
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #17212b;
            border-radius: 12px;
            padding: 20px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            position: relative;
        }
        
        /* Ficha Técnica de Datos de Telegram */
        .meta-box-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #24303f;
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 15px;
            font-family: monospace;
            font-size: 13px;
            border-left: 4px solid #2ea6ff;
        }
        .meta-box-container p { margin: 3px 0; }
        .tg-user { color: #2ec4b6; font-weight: bold; }
        .op-number { color: #ff9f43; font-weight: bold; }
        .live-clock { color: #b1c7df; }
        .saludo-msg { font-size: 14px; color: #b1c7df; font-family: sans-serif; }

        /* Controles de la Calculadora */
        .toggle-calc-type {
            display: flex;
            background-color: #24303f;
            border-radius: 6px;
            padding: 4px;
            margin-bottom: 15px;
        }
        .toggle-btn {
            flex: 1;
            text-align: center;
            padding: 8px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            color: #8199b1;
            transition: all 0.2s;
        }
        .toggle-btn.active {
            background-color: #2ea6ff;
            color: #ffffff;
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #b1c7df; font-size: 13px; }
        
        input[type="number"], input[type="text"], select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #24303f;
            background-color: #24303f;
            color: white;
            font-size: 15px;
            box-sizing: border-box;
        }
        
        .info-calculo {
            background-color: #1a2734;
            padding: 12px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 13px;
        }
        .info-calculo div {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        .total-bs { font-size: 17px; color: #2ec4b6; font-weight: bold; }
        
        .registro-banco-box {
            background-color: #1a2734;
            border: 1px solid #24303f;
            border-radius: 8px;
            padding: 15px;
            margin-top: 12px;
            display: none;
        }

        .terms-container {
            background-color: #1a2734;
            border: 1px solid #24303f;
            border-radius: 6px;
            padding: 10px;
            margin-top: 12px;
            font-size: 11px;
            color: #b1c7df;
            line-height: 1.4;
        }
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            margin-top: 8px;
            font-size: 12px;
        }
        .checkbox-group input { margin-right: 8px; margin-top: 2px; cursor: pointer; }

        .four11-notice {
            background-color: #111923;
            border: 1px dashed #4b5c6e;
            color: #a0b6cd;
            font-size: 11px;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            margin-top: 15px;
        }

        #paypal-button-container { 
            margin-top: 15px; 
            pointer-events: none; 
            opacity: 0.2; 
        }
        
        .success-box {
            background-color: #1b4332;
            border: 1px solid #2d6a4f;
            color: #d8f3dc;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            display: none;
            margin-top: 15px;
        }
        .btn-download {
            background-color: #2ea6ff;
            color: white;
            border: none;
            padding: 10px 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }
        
        .url-lock-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(23, 33, 43, 0.97);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-sizing: border-box;
            text-align: center;
            z-index: 100;
        }

        #invoice-pdf-template { display: none; background: white; color: #333; padding: 30px; font-family: Arial, sans-serif; }
    </style>
</head>

<header class="sitio-header">
    <div class="contenedor-header">
        <a href="index.html" class="logo-link">
            <img src="Gemini_Generated_Image_v6oxq3v6oxq3v6ox (1).png" alt="Logo de ppabs" class="logo-img">
        </a>

        <nav class="navegacion">
            <span id="txt-saludo-dinamico" class="saludo-msg">☀️ ¡Hola!</span>
        </nav>

</header>

<div class="main-wrapper">
    <div class="container">
        <div id="url-lock" class="url-lock-overlay">
            <span style="font-size: 40px; margin-bottom: 15px;">🔒</span>

            <div>

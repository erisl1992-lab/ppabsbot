<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayPal a Bolívares</title>
    <!-- SDK Oficial de Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #f4f4f7);
            --text-color: var(--tg-theme-text-color, #000000);
            --hint-color: var(--tg-theme-hint-color, #aaaaaa);
            --button-color: var(--tg-theme-button-color, #007cb0);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
            --card-bg: var(--tg-theme-secondary-bg-color, #ffffff);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--card-bg);
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 16px;
        }

        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: var(--button-color);
        }

        .tasa-info {
            font-size: 0.9rem;
            color: var(--hint-color);
            margin-bottom: 15px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        /* Cabecera del banco con logo dinámico */
        .banco-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .banco-logo {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: contain;
            background-color: #fff;
            border: 1px solid #ddd;
            padding: 2px;
            box-sizing: border-box;
        }

        .cuenta-container {
            display: flex;
            gap: 5px;
        }

        .prefijo-cuenta {
            width: 75px;
            font-weight: bold;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.05);
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 12px 0;
            font-size: 1rem;
        }

        .resultado-box {
            background-color: rgba(0, 124, 176, 0.1);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            margin-top: 10px;
        }

        .resultado-box strong {
            color: var(--button-color);
        }

        /* Estilo para el switch de guardar datos */
        .switch-group {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            margin-top: 15px;
            cursor: pointer;
        }

        .switch-group input {
            width: auto;
        }

        .btn-enviar {
            width: 100%;
            padding: 14px;
            background-color: var(--button-color);
            color: var(--button-text);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .oculto {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Calculadora de Cambio</h2>
        <div class="tasa-info">Tasa de cambio: <span id="tasa-actual">45.00</span> Bs / $</div>

        <div class="input-group">
            <label for="paypal-enviar">Monto bruto que enviarás en PayPal ($):</label>
            <input type="number" id="paypal-enviar" placeholder="Ej: 10" min="1" step="0.01">
        </div>

        <div class="resultado-box">
            Comisión PayPal (5.4% + 0.30): <span id="comision-fee">$0.00</span><br>
            <strong>Monto neto que recibimos: <span id="monto-neto">$0.00</span></strong>
        </div>

        <div class="input-group" style="margin-top: 15px;">
            <label>Vas a recibir en Bolívares:</label>
            <input type="text" id="bs-recibir" readonly style="font-weight: bold; background-color: rgba(0,0,0,0.05); color: var(--text-color);">
        </div>
    </div>

    <div class="card">
        <h2>Datos de Recepción</h2>
        
        <div class="banco-header">
            <!-- El logo cambiará por JavaScript -->
            <img src="https://logo.clearbit.com/bancodevenezuela.com" id="logo-visual" class="banco-logo" alt="Logo Banco">
            <div style="flex-grow: 1;">
                <label for="banco">Banco Destino:</label>
                <select id="banco">
                    <option value="0102">Banco de Venezuela (BDV)</option>
                    <option value="0134">Banesco</option>
                    <option value="0105">Mercantil Banco</option>
                    <option value="0108">Provincial (BBVA)</option>
                    <option value="0172">Bancamiga</option>
                    <option value="0114">Bancaribe</option>
                    <option value="0163">Banco del Tesoro</option>
                    <option value="0115">Exterior</option>
                    <option value="0128">Banco Caroní</option>
                    <option value="0151">BFC Banco Fondo Común</option>
                    <option value="0169">R4</option>
                    <option value="0138">Banplus</option>
                    <option value="0156">100% Banco</option>
                    <option value="0157">DelSur</option>
                    <option value="0166">Banco Agrícola de Venezuela</option>
                    <option value="0174">Banfanb</option>
                    <option value="0175">Banco Digital de los Trabajadores BDT</option>
                    <option value="0177">Bancrecer</option>
                    <option value="0191">BNC (Banco Nacional de Crédito)</option>
                    <option value="0178">N58 Banco Digital</option>
                    <option value="0137">Sofitasa</option>
                    <option value="0146">Bangente</option>
                    <option value="0104">Venezolano de Crédito</option>
                    <option value="0171">Banco Activo</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label for="tipo-pago">Método de Recepción:</label>
            <select id="tipo-pago">
                <option value="pago-movil">Pago Móvil</option>
                <option value="transferencia">Transferencia Bancaria</option>
            </select>
        </div>

        <div class="input-group">
            <label for="nombre">Nombre Completo del Beneficiario:</label>
            <input type="text" id="nombre" placeholder="Ej: Juan Pérez">
        </div>

        <div class="input-group">
            <label for="cedula">Cédula de Identidad:</label>
            <input type="text" id="cedula" placeholder="V-12345678">
        </div>

        <!-- Grupo exclusivo de Pago Móvil -->
        <div class="input-group" id="grupo-telefono">
            <label for="telefono">Teléfono asociado al Pago Móvil:</label>
            <input type="tel" id="telefono" placeholder="04121234567">
        </div>

        <!-- Grupo exclusivo de Transferencias -->
        <div class="input-group oculto" id="grupo-cuenta">
            <label for="cuenta-restante">Número de Cuenta Bancaria (20 dígitos):</label>
            <div class="cuenta-container">
                <div class="prefijo-cuenta" id="prefijo-banco">0102</div>
                <input type="text" id="cuenta-restante" placeholder="Coloque los 16 dígitos restantes" maxlength="16" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            </div>
        </div>

        <!-- Guardar datos localmente -->
        <label class="switch-group">
            <input type="checkbox" id="guardar-datos" checked>
            Recordar estos datos para mi próxima transacción
        </label>
    </div>

    <button class="btn-enviar" id="btn-procesar">Continuar al Pago</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const TASA_CAMBIO = 45.00; 
        document.getElementById('tasa-actual').innerText = TASA_CAMBIO.toFixed(2);

            // Mapeo de logos usando DuckDuckGo Icons (Servicio activo y gratuito)
        const logosBancos = {
            "0102": "https://external-content.duckduckgo.com/ip3/bancodevenezuela.com.ico",
            "0134": "https://external-content.duckduckgo.com/ip3/banesco.com.ico",
            "0105": "https://external-content.duckduckgo.com/ip3/bancomercantil.com.ico",
            "0108": "https://external-content.duckduckgo.com/ip3/bbvaprovincial.com.ico",
            "0172": "https://external-content.duckduckgo.com/ip3/bancamiga.com.ico",
            "0114": "https://external-content.duckduckgo.com/ip3/bancaribe.com.ve.ico",
            "0163": "https://external-content.duckduckgo.com/ip3/bt.com.ve.ico",
            "0115": "https://external-content.duckduckgo.com/ip3/bancoexterior.com.ico",
            "0128": "https://external-content.duckduckgo.com/ip3/bancocaroni.com.ve.ico",
            "0151": "https://external-content.duckduckgo.com/ip3/bfc.com.ve.ico",
            "0169": "https://img.icons8.com/color/96/bank.png", // R4 utiliza genérico temporal
            "0138": "https://external-content.duckduckgo.com/ip3/banplus.com.ico",
            "0156": "https://external-content.duckduckgo.com/ip3/100banco.com.ve.ico",
            "0157": "https://external-content.duckduckgo.com/ip3/delsur.com.ve.ico",
            "0166": "https://img.icons8.com/color/96/bank.png", // Agrícola genérico
            "0174": "https://external-content.duckduckgo.com/ip3/banfanb.com.ve.ico",
            "0175": "https://external-content.duckduckgo.com/ip3/bdt.com.ve.ico", // Nuevo BDT
            "0177": "https://external-content.duckduckgo.com/ip3/bancrecer.com.ve.ico",
            "0191": "https://external-content.duckduckgo.com/ip3/bnconline.com.ico",
            "0178": "https://external-content.duckduckgo.com/ip3/n58bancodigital.com.ico",
            "0137": "https://external-content.duckduckgo.com/ip3/sofitasa.com.ico",
            "0146": "https://external-content.duckduckgo.com/ip3/bangente.com.ve.ico",
            "0104": "https://external-content.duckduckgo.com/ip3/bvc.com.ve.ico",
            "0171": "https://external-content.duckduckgo.com/ip3/bancoactivo.com.ico"
        };

        const inputPaypal = document.getElementById('paypal-enviar');
        const txtComision = document.getElementById('comision-fee');
        const txtNeto = document.getElementById('monto-neto');
        const inputBs = document.getElementById('bs-recibir');
        
        const selectTipoPago = document.getElementById('tipo-pago');
        const selectBanco = document.getElementById('banco');
        const imgLogo = document.getElementById('logo-visual');
        const grupoTelefono = document.getElementById('grupo-telefono');
        const grupoCuenta = document.getElementById('grupo-cuenta');
        const prefijoBanco = document.getElementById('prefijo-banco');
        const btnProcesar = document.getElementById('btn-procesar');

        // Cargar datos guardados previamente si existen
        window.addEventListener('load', () => {
            const datosGuardados = localStorage.getItem('tma_datos_pago');
            if (datosGuardados) {
                const datos = JSON.parse(datosGuardados);
                selectBanco.value = datos.banco || "0102";
                selectTipoPago.value = datos.tipo || "pago-movil";
                document.getElementById('nombre').value = datos.nombre || "";
                document.getElementById('cedula').value = datos.cedula || "";
                document.getElementById('telefono').value = datos.telefono || "";
                document.getElementById('cuenta-restante').value = datos.cuentaRestante || "";
                
                // Disparar eventos visuales para actualizar interfaz
                selectTipoPago.dispatchEvent(new Event('change'));
                selectBanco.dispatchEvent(new Event('change'));
            }
        });

        // Calculadora de montos
        inputPaypal.addEventListener('input', () => {
            const montoBruto = parseFloat(inputPaypal.value);
            if (isNaN(montoBruto) || montoBruto <= 0) {
                txtComision.innerText = "$0.00";
                txtNeto.innerText = "$0.00";
                inputBs.value = "0.00 Bs.";
                return;
            }
            const comision = (montoBruto * 0.054) + 0.30;
            const montoNeto = montoBruto - comision;

            if (montoNeto <= 0) {
                txtComision.innerText = `$${comision.toFixed(2)}`;
                txtNeto.innerText = "$0.00";
                inputBs.value = "Monto muy bajo";
                return;
            }
            const bolivares = montoNeto * TASA_CAMBIO;
            txtComision.innerText = `$${comision.toFixed(2)}`;
            txtNeto.innerText = `$${montoNeto.toFixed(2)}`;
            inputBs.value = `${bolivares.toLocaleString("es-VE", {minimumFractionDigits: 2, maximumFractionDigits: 2})} Bs.`;
        });

        // Alternar entre Pago Móvil y Transferencia
        selectTipoPago.addEventListener('change', () => {
            if (selectTipoPago.value === 'pago-movil') {
                grupoTelefono.classList.remove('oculto');
                grupoCuenta.classList.add('oculto');
            } else {
                grupoTelefono.classList.add('oculto');
                grupoCuenta.classList.remove('oculto');
            }
        });

        // Cambiar dinámicamente los números de cuenta y el LOGO del banco
        selectBanco.addEventListener('change', () => {
            const codigo = selectBanco.value;
            prefijoBanco.innerText = codigo;
            
            // Actualizar logo usando el mapa de URLs. Si no existe, usa un icono genérico de banco
            imgLogo.src = logosBancos[codigo] || "https://img.icons8.com/color/96/bank.png";
        });

        // Procesar orden y guardar
        btnProcesar.addEventListener('click', () => {
            const tipo = selectTipoPago.value;
            const banco = selectBanco.value;
            const nombre = document.getElementById('nombre').value;
            const cedula = document.getElementById('cedula').value;
            const monto = inputPaypal.value;
            const guardar = document.getElementById('guardar-datos').checked;

            if (!monto || !cedula || !nombre) {
                tg.showAlert("Por favor, rellene el nombre, la cédula y el monto.");
                return;
            }

            const telefono = document.getElementById('telefono').value;
            const restante = document.getElementById('cuenta-restante').value;

            if (tipo === 'pago-movil' && !telefono) {
                tg.showAlert("Por favor, introduzca el teléfono de Pago Móvil.");
                return;
            }
            if (tipo === 'transferencia' && restante.length !== 16) {
                tg.showAlert("La cuenta de transferencia debe tener exactamente 16 dígitos.");
                return;
            }

            // Guardar datos si la casilla está marcada
            if (guardar) {
                const infoA_Guardar = {
                    banco, tipo, nombre, cedula, telefono, cuentaRestante: restante
                };
                localStorage.setItem('tma_datos_pago', JSON.stringify(infoA_Guardar));
            } else {
                localStorage.removeItem('tma_datos_pago');
            }

            // Confirmación visual nativa
            const destinoInfo = tipo === 'pago-movil' ? `Tlf: ${telefono}` : `Cuenta: ${banco}${restante}`;
            tg.showAlert(`¡Orden Registrada!\nBeneficiario: ${nombre}\nCédula: ${cedula}\n${destinoInfo}\nMonto Bruto: $${monto}`);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayPal a Bolívares</title>
    <!-- SDK Oficial de Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #f4f4f7);
            --text-color: var(--tg-theme-text-color, #000000);
            --hint-color: var(--tg-theme-hint-color, #aaaaaa);
            --button-color: var(--tg-theme-button-color, #007cb0);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
            --card-bg: var(--tg-theme-secondary-bg-color, #ffffff);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--card-bg);
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 16px;
        }

        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: var(--button-color);
        }

        .tasa-info {
            font-size: 0.9rem;
            color: var(--hint-color);
            margin-bottom: 15px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .resultado-box {
            background-color: rgba(0, 124, 176, 0.1);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            margin-top: 10px;
        }

        .resultado-box strong {
            color: var(--button-color);
        }

        /* El botón nativo de Telegram se configurará por JS, pero dejamos este por si acaso */
        .btn-enviar {
            width: 100%;
            padding: 14px;
            background-color: var(--button-color);
            color: var(--button-text);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Calculadora de Cambio</h2>
        <div class="tasa-info">Tasa de cambio: <span id="tasa-actual">45.00</span> Bs / $</div>

        <div class="input-group">
            <label for="paypal-enviar">Monto bruto que enviarás en PayPal ($):</label>
            <input type="number" id="paypal-enviar" placeholder="Ej: 10" min="1" step="0.01">
        </div>

        <div class="resultado-box">
            Comisión PayPal (5.4% + 0.30): <span id="comision-fee">$0.00</span><br>
            <strong>Monto neto que recibimos: <span id="monto-neto">$0.00</span></strong>
        </div>

        <div class="input-group" style="margin-top: 15px;">
            <label>Vas a recibir en Bolívares:</label>
            <input type="text" id="bs-recibir" readonly style="font-weight: bold; background-color: #e9e9e9; color: #333;">
        </div>
    </div>

    <div class="card">
        <h2>Datos de Pago Móvil</h2>
        <div class="input-group">
            <label for="banco">Banco Destino:</label>
            <select id="banco">
                <option value="0102">Banco de Venezuela (BDV)</option>
                <option value="0134">Banesco</option>
                <option value="0105">Mercantil Banco</option>
                <option value="0108">Provincial (BBVA)</option>
                <option value="0172">Bancamiga</option>
                <option value="0114">Bancaribe</option>
                <option value="0163">Banco del Tesoro</option>
                <option value="0115">Exterior</option>
                <option value="0128">Banco Caroní</option>
                <option value="0151">BFC Banco Fondo Común</option>
                <option value="0169">R4</option>
                <option value="0174">Banplus</option>
                <option value="0156">100% Banco</option>
                <option value="0157">DelSur</option>
                <option value="0166">Banco Agrícola de Venezuela</option>
                <option value="0177">Banfanb</option>
                <option value="0175">Banco Digital de los Trabajadores BDT</option>
                <option value="0168">Bancrecer</option>
                <option value="0191">BNC (Banco Nacional de Crédito)</option>
                <option value="0178">N58 Banco Digital</option>
                <option value="0137">Sofitasa</option>
                <option value="0146">Bangente</option>
                <option value="0104">Venezolano de Crédito</option>
                <option value="0171">Banco Activo</option>
            </select>
        </div>
        <div class="input-group">
            <label for="cedula">Cédula de Identidad:</label>
            <input type="text" id="cedula" placeholder="V-12345678">
        </div>
        <div class="input-group">
            <label for="telefono">Teléfono asociado al Pago Móvil:</label>
            <input type="tel" id="telefono" placeholder="04121234567">
        </div>
    </div>

    <button class="btn-enviar" id="btn-procesar">Continuar al Pago</button>

    <script>
        // Inicializar Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Abre la app a pantalla completa

        // Variables de negocio (Simuladas por ahora)
        const TASA_CAMBIO = 45.00; // Puedes cambiar este valor para probar
        document.getElementById('tasa-actual').innerText = TASA_CAMBIO.toFixed(2);

        // Elementos del DOM
        const inputPaypal = document.getElementById('paypal-enviar');
        const txtComision = document.getElementById('comision-fee');
        const txtNeto = document.getElementById('monto-neto');
        const inputBs = document.getElementById('bs-recibir');
        const btnProcesar = document.getElementById('btn-procesar');

        // Función para calcular montos
        inputPaypal.addEventListener('input', () => {
            const montoBruto = parseFloat(inputPaypal.value);

            if (isNaN(montoBruto) || montoBruto <= 0) {
                txtComision.innerText = "$0.00";
                txtNeto.innerText = "$0.00";
                inputBs.value = "0.00 Bs.";
                return;
            }

            // Fórmula oficial de PayPal: Comisión = (Monto * 5.4%) + 0.30
            const comision = (montoBruto * 0.054) + 0.30;
            const montoNeto = montoBruto - comision;

            if (montoNeto <= 0) {
                txtComision.innerText = `$${comision.toFixed(2)}`;
                txtNeto.innerText = "$0.00";
                inputBs.value = "Monto muy bajo";
                return;
            }

            // Calcular Bolívares basados en el monto neto real que te queda a ti
            const bolivares = montoNeto * TASA_CAMBIO;

            // Mostrar resultados en pantalla
            txtComision.innerText = `$${comision.toFixed(2)}`;
            txtNeto.innerText = `$${montoNeto.toFixed(2)}`;
            inputBs.value = `${bolivares.toLocaleString("es-VE", {minimumFractionDigits: 2, maximumFractionDigits: 2})} Bs.`;
        });

        // Evento del botón
        btnProcesar.addEventListener('click', () => {
            const banco = document.getElementById('banco').value;
            const cedula = document.getElementById('cedula').value;
            const telefono = document.getElementById('telefono').value;
            const monto = inputPaypal.value;

            if (!monto || !cedula || !telefono) {
                tg.showAlert("Por favor, rellena todos los campos antes de continuar.");
                return;
            }

            tg.showAlert(`Procesando orden:\nEnviarás $${monto} PayPal para recibir en el Pago Móvil del banco ${banco}.`);
        });
    </script>
</body>
</html>
